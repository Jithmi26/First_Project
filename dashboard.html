<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 200px;
      background: #2c3e50;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      text-align: center;
    }

    .sidebar a {
      display: block;
      color: white;
      padding: 10px;
      text-decoration: none;
      margin: 5px 0;
    }

    .sidebar a:hover {
      background: #34495e;
    }

    /* Main Content */
    .main {
      flex: 1;
      padding: 20px;
      background: #ecf0f1;
    }

    .header {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      flex: 1;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>Dashboard</h2>
    <a href="#">Home</a>
    <a href="#">Reports</a>
    <a href="#">Settings</a>
  </div>

  <div class="main">
    <div class="header">Welcome!</div>

    <div class="cards">
      <div class="card">
        <h3>Users</h3>
        <p>120</p>
      </div>
      <div class="card">
        <h3>Sales</h3>
        <p>$530</p>
      </div>
      <div class="card">
        <h3>Orders</h3>
        <p>75</p>
      </div>
    </div>
  </div>

</body>
</html>
